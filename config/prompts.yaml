# LLM에 보낼 user 메시지 템플릿. {placeholders}는 generator.py에서 채워넣습니다.
# 과거 게시글 목록은 generator가 system block으로 따로 끼워넣으므로 여기엔 없습니다
# (그쪽이 prompt cache 대상). 본 템플릿은 매 호출마다 변하는 짧은 user 지시문만 담습니다.

daily: |
  '호지프릭스' 브랜드 SNS에 올릴 '일상' 글을 한 편 작성해 주세요.

  요구사항:
  - 시스템에 첨부된 "최근 게시한 글" 목록과 **소재·어휘·문장 구조가 명확히 달라야** 합니다. 같은 풍경·감각·계절감을 다시 묘사하지 마세요. (목록이 없으면 자유롭게 작성)
  - 직접적인 제품 홍보는 하지 마세요.
  - 차 한 잔의 여유, 계절감, 일상의 작은 순간 중 하나를 골라 묘사하세요.
  - 200자 내외. 해시태그 1~2개.
  - 본문만 출력 (설명·따옴표 없이).

promo: |
  '호지프릭스' 호지차 티백을 부드럽게 홍보하는 SNS 글을 작성해 주세요.

  요구사항:
  - 시스템에 첨부된 "최근 게시한 글" 목록과 **셀링 포인트·어휘·문장 구조가 명확히 달라야** 합니다. 같은 각도(향, 우림 시간, 색 등)를 두 번 쓰지 마세요.
  - "구매하세요" 같은 직접 권유 대신, 제품을 마시는 경험·장면을 묘사하세요.
  - 200자 내외. 해시태그 1~2개.
  - 본문만 출력.

reply: |
  아래는 '호지프릭스'를 태그하거나 내 글에 답글로 달린 내용입니다. 자연스럽고 따뜻한 답글 1편을 작성해 주세요.

  작성자: @{author}
  내용: "{text}"

  요구사항:
  - 100자 내외.
  - "좋은 하루 되세요" 같은 정형화된 인사말은 피하고, 작성자가 언급한 구체적 내용 한 가지에 반응하세요.
  - 본문만 출력.
